<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 練習作業</title>
    <style>
        table { border-collapse: collapse; width:100%; border: 1px solid #dddddd; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color:#ffffff; padding: 10px; border: 1px solid #cccccc; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        
        .course-link { color: #0066cc; text-decoration: underline; cursor: pointer; }

        #popover {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: white; border: 2px solid #ccc;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 1000;
        }
        #popover header { background: #f1f1f1; padding: 10px; display: flex; justify-content: space-between; }
        #popover iframe { width: 100%; height: calc(100% - 45px); border: none; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
    </style>
</head>
<body>

    <h1>資工選課表</h1>

    <table id="csie">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>資工系</td><td class="course-link" onclick="openPopover('A2337')">物件導向軟體設計</td><td class="teacher">黃崇源</td></tr>
            <tr><td>資工系</td><td class="course-link" onclick="openPopover('71790')">計算機網路實驗</td><td class="teacher">李春良</td></tr>
            <tr><td>資工系</td><td class="course-link" onclick="openPopover('A2338')">作業系統實務</td><td class="teacher">張哲維</td></tr>
            <tr><td>資工系</td><td class="course-link" onclick="openPopover('71796')">生物統計</td><td class="teacher">陳光武</td></tr>
            <tr><td>資工系</td><td class="course-link" onclick="openPopover('A2339')">通訊系統</td><td class="teacher">陳仁暉</td></tr>
            <tr><td>資工系</td><td class="course-link" onclick="openPopover('A2340')">軟硬體專題(2)</td><td class="teacher">魏志達</td></tr>
        </tbody>
    </table>

    <br>
    <button onclick="changeResult()">Change</button>

    <div id="overlay" onclick="closePopover()"></div>
    <div id="popover">
        <header>
            <button onclick="closePopover()">關閉 [X]</button>
        </header>
        <iframe id="courseFrame" src=""></iframe>
    </div>

    <script>
        function changeResult() {
            const teacherNames = ["黃崇源", "李春良", "張哲維", "陳光武", "陳仁暉", "魏志達"];
            const teacherCells = document.querySelectorAll('.teacher');

            teacherCells.forEach(td => {
                const randomIndex = Math.floor(Math.random() * teacherNames.length);
                td.innerText = teacherNames[randomIndex];
            });
        }

        function openPopover(code) {
            const url = `https://catalog.cgu.edu.tw/coursedata?sectionid=${code}`;
            document.getElementById('courseFrame').src = url;
            document.getElementById('popover').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closePopover() {
            document.getElementById('popover').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('courseFrame').src = '';
        }
    </script>

</body>
</html>
